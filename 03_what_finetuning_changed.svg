<svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif">
  <!-- title -->
  <text x="500" y="44" text-anchor="middle" font-size="20" font-weight="500" fill="#0E1014">What fine-tuning actually changed</text>
  <text x="500" y="68" text-anchor="middle" font-size="13" font-style="italic" fill="#545963">The prior won by orders of magnitude.</text>

  <!-- LEFT: donut chart -->
  <g transform="translate(210, 300)">
    <circle cx="0" cy="0" r="110" fill="none" stroke="#EDEEF1" stroke-width="50"/>
    <!-- 0.52% trained sliver - barely visible by design -->
    <path d="M 0 -110 A 110 110 0 0 1 5.99 -109.84 L 4.36 -79.88 A 80 80 0 0 0 0 -80 Z" fill="#0E1014"/>
    <text x="0" y="-6" text-anchor="middle" font-size="28" font-weight="500" font-family="'IBM Plex Mono', ui-monospace, monospace" fill="#0E1014">8.07B</text>
    <text x="0" y="14" text-anchor="middle" font-size="11" font-family="'IBM Plex Mono', ui-monospace, monospace" letter-spacing="0.08em" fill="#545963">TOTAL PARAMS</text>
  </g>

  <!-- annotation block (placed above, arrow comes from below the text) -->
  <text x="310" y="150" font-size="12" font-family="'IBM Plex Mono', ui-monospace, monospace" fill="#0E1014">0.52% trained</text>
  <text x="310" y="168" font-size="12" font-family="'IBM Plex Mono', ui-monospace, monospace" fill="#545963">41.9M LoRA params</text>
  <text x="310" y="186" font-size="11" font-style="italic" fill="#9095A0">5 CDU examples x 3 epochs</text>
  <!-- arrow originates left of the text block, curves down-left to the sliver, never crossing the text -->
  <path d="M 300 165 Q 255 178 232 188" stroke="#9095A0" stroke-width="1.2" fill="none"/>
  <polygon points="232,188 240,184 239,192" fill="#9095A0"/>

  <text x="210" y="450" text-anchor="middle" font-size="12" font-family="'IBM Plex Mono', ui-monospace, monospace" letter-spacing="0.05em" fill="#545963">99.48% FROZEN BASE</text>

  <!-- divider -->
  <line x1="470" y1="120" x2="470" y2="480" stroke="#DFE2E7" stroke-width="1"/>

  <!-- RIGHT: scale comparison bars -->
  <g transform="translate(510, 150)">
    <text x="0" y="0" font-size="13" font-family="'IBM Plex Mono', ui-monospace, monospace" letter-spacing="0.05em" fill="#545963">WHAT THE LORA SAW</text>
    <rect x="0" y="14" width="6" height="28" fill="#0E1014"/>
    <text x="16" y="34" font-size="13" fill="#0E1014">15 training exposures</text>
    <text x="16" y="52" font-size="11" font-style="italic" fill="#9095A0">5 examples x 3 epochs</text>

    <text x="0" y="118" font-size="13" font-family="'IBM Plex Mono', ui-monospace, monospace" letter-spacing="0.05em" fill="#545963">WHAT THE BASE MODEL SAW</text>
    <text x="300" y="118" font-size="11" font-style="italic" fill="#9095A0">(continues off-frame)</text>
    <rect x="0" y="132" width="420" height="28" fill="#0E1014"/>
    <text x="0" y="182" font-size="13" fill="#0E1014">~15 trillion tokens</text>
    <text x="0" y="200" font-size="11" font-style="italic" fill="#9095A0">millions of "sizing + kW + rack" co-occurrences -&gt; electrical</text>

    <!-- ratio callout -->
    <text x="0" y="278" font-size="12" font-family="'IBM Plex Mono', ui-monospace, monospace" letter-spacing="0.05em" fill="#0E1014">SIGNAL RATIO  ~  1 : 1,000,000,000,000</text>
    <text x="0" y="298" font-size="11" font-style="italic" fill="#545963">The base prior is 12 orders of magnitude stronger.</text>
  </g>
</svg>
